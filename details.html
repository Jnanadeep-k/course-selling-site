<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 0; margin: 0; }
        .header { background-color: #1183ca; color: white; padding: 30px; text-align: center; font-size: 28px; font-weight: bold; }
        .container { max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 20px; cursor: pointer; font-size: 16px; text-align: center; }
        .buy-btn { background-color: #1183ca; color: white; border: none; width: 100%; display: block; }
        .back-btn { background-color: #6c757d; color: white; display: inline-block; }
        h2 { color: #333; margin-top: 0; }
        p { color: #555; line-height: 1.6; font-size: 16px; }
        ul { padding-left: 20px; }
        li { margin-bottom: 10px; color: #444; font-size: 15px; }
    </style>
</head>
<body>

    <div class="header">Course Details</div>

    <div class="container">
        <!-- These elements must exist for the JavaScript to replace them -->
        <h2 id="course-heading">Loading Course Details...</h2>
        <p id="course-desc"></p>
        <div id="syllabus-section"></div>

        <!-- The payment trigger button -->
        <button id="buyButton" class="btn buy-btn">Buy Course</button>
        <a href="index.html" class="btn back-btn">← Back to Courses</a>
    </div>

    <!-- Official Razorpay Library Link -->
    <script src="https://razorpay.com"></script>
    <script>
    // Complete course dataset including pricing
    const courseData = {
        javascript: {
            title: "Full-Stack JavaScript",
            desc: "Master the ultimate programming language used to build modern web applications from scratch.",
            price: 599,
            syllabus: ["Advanced JavaScript: Async/Await & Promises", "ES6+ Modern Features", "REST API Integration & Node.js Basics"]
        },
        python: {
            title: "Python for Data Science",
            desc: "Master the world's most popular language for data analytics, scripting, and machine learning models.",
            price: 699,
            syllabus: ["Python Fundamentals & Syntax", "Data structures (Lists, Dicts, Tuples)", "Pandas, NumPy & Data Visualization"]
        },
        devops: {
            title: "DevOps & Cloud Engineering",
            desc: "Bridge the gap between software development and IT operations with powerful automation tools.",
            price: 899,
            syllabus: ["Linux Systems & Bash Scripting", "Mastering Git & Command Line Basics", "CI/CD Deployment Pipelines"]
        },
        java: {
            title: "Mastering Java & Spring Boot",
            desc: "Learn core Java concepts, object-oriented programming architectures, and robust backend microservices.",
            price: 799,
            syllabus: ["Java Basics & OOPs Deep Dive", "Java Collections Framework", "Building REST APIs with Spring Boot"]
        }
    };

    // Extract course token from browser URL string
    const urlParams = new URLSearchParams(window.location.search);
    const courseKey = urlParams.get('course'); 

    // Find layout containers
    const courseHeading = document.getElementById('course-heading');
    const courseDesc = document.getElementById('course-desc');
    const syllabusSection = document.getElementById('syllabus-section');
    const buyBtn = document.getElementById("buyButton");

    // If a valid matching course key exists, inject the information dynamically
    if (courseKey && courseData[courseKey]) {
        const course = courseData[courseKey];
        
        if (courseHeading) courseHeading.innerText = "About " + course.title;
        if (courseDesc) courseDesc.innerText = course.desc;
        
        if (syllabusSection) {
            let htmlList = "<h3 style='color: #1183ca; margin-top: 25px;'>Course Syllabus & Modules</h3><ul>";
            course.syllabus.forEach(item => {
                htmlList += <li>${item}</li>;
            });
            htmlList += "</ul>";
            syllabusSection.innerHTML = htmlList;
        }

        // Attach Razorpay payment to the Buy Button click handler
        if (buyBtn) {
            buyBtn.onclick = function() {
                var options = {
                    "key": "rzp_test_TD05ZkHE9mLXg8", 
                    "amount": course.price * 100, // Converts amount to paise
                    "currency": "INR",
                    "name": "Learn Code Online",
                    "description": "Purchase for " + course.title,
                    "handler": function (response) {
                        alert("Payment Successful! ID: " + response.razorpay_payment_id);
                    },
                    "prefill": {
                        "name": "Student Name",
                        "email": "student@example.com"
                    },
                    "theme": {
                        "color": "#1183ca"
                    }
                };
                var rzp1 = new Razorpay(options);
                rzp1.open();
            };
        }
    } else {
        // Fallback message if key fails to match
        if (courseHeading) courseHeading.innerText = "Course Profile Selection Missing";
        if (courseDesc) courseDesc.innerText = "Please navigate back to the main homepage.";
        if (buyBtn) buyBtn.style.display = 'none';
    }
    </script>
</body>
</html>
