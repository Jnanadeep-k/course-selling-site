<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 id="courseTitle">Loading Course Details...</h1>
        <p id="courseDescription"></p>
        <div id="courseSyllabus"></div>
        <div id="coursePrice" class="price"></div>
        
        <!-- Keep your button elements here -->
        <button id="buyButton" class="buy-btn">Buy Course</button>
        <a href="courses.html" class="back-btn">← Back to Courses</a>
    </div>

    <!-- MAIN DATA LOADING SCRIPT BLOCK -->
    <script src="app.js"></script>
    <script>
        // Global variables to store current course details
        let currentTitle = "";
        let currentPrice = 0;

        document.addEventListener("DOMContentLoaded", function() {
            // Your original URL parsing and content generation logic goes here
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('course');

            if (courseId && typeof courseData !== 'undefined' && courseData[courseId]) {
                const course = courseData[courseId];
                currentTitle = course.title;
                currentPrice = course.price;

                document.getElementById("courseTitle").innerText = course.title;
                document.getElementById("courseDescription").innerText = course.description;
                document.getElementById("coursePrice").innerText = "₹" + course.price;
                
                // Tie the buy button click cleanly to the payment trigger
                document.getElementById("buyButton").onclick = function() {
                    processCheckout(currentTitle, currentPrice);
                };
            } else {
                document.getElementById("courseTitle").innerText = "Course Not Found";
            }
        });
    </script>

    <!-- RAZORPAY PAYMENT ENGINE SCRIPT BLOCK -->
    <script src="https://razorpay.com"></script>
    <script>
    function processCheckout(title, price) {
        var sheetAppUrl = "PASTE_YOUR_GOOGLE_WEB_APP_URL_HERE"; 

        var options = {
            "key": "rzp_test_TDO5ZkHE9MLXg8", 
            "amount": price * 100, 
            "currency": "INR",
            "name": "Learn Code Online",
            "description": "Purchase for " + title,
            "handler": function (response) {
                alert("Payment Successful! ID: " + response.razorpay_payment_id);

                var orderPayload = {
                    courseName: title,
                    amount: price,
                    status: "Success - ID: " + response.razorpay_payment_id
                };

                fetch(sheetAppUrl, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(orderPayload)
                })
                .then(() => console.log("Data logged successfully."))
                .catch(err => console.error("Error logging data:", err));
            },
            "prefill": {
                "name": "Student Name",
                "email": "student@example.com"
            },
            "theme": { "color": "#1183ca" }
        };
        var rzp = new Razorpay(options);
        rzp.open();
    }
    </script>
</body>
</html>
